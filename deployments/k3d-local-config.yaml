apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: openchoreo
image: rancher/k3s:v1.32.9-k3s1
servers: 1
agents: 0
kubeAPI:
  hostPort: "6550"
ports:
  # Control Plane (8xxx)
  - port: 8080:8080
    nodeFilters: [loadbalancer]
  - port: 8443:8443
    nodeFilters: [loadbalancer]
  # Data Plane (19xxx)
  - port: 19080:19080
    nodeFilters: [loadbalancer]
  - port: 19443:19443
    nodeFilters: [loadbalancer]
  # Workflow Plane (10xxx)
  - port: 10081:10081
    nodeFilters: [loadbalancer]
  - port: 10082:10082
    nodeFilters: [loadbalancer]
  # Observability Plane (11xxx)
  - port: 11080:11080
    nodeFilters: [loadbalancer]
  - port: 11085:11085
    nodeFilters: [loadbalancer]
  - port: 11081:5601
    nodeFilters: [loadbalancer]
  - port: 11082:9200
    nodeFilters: [loadbalancer]
  # OpenBao (8200) — routed through the loadbalancer so docker-compose
  # services (git-service) can reach it via host.docker.internal:8200.
  # The in-cluster Service is patched to NodePort 30820 by setup-prerequisites.sh.
  - port: 8200:30820
    nodeFilters: [loadbalancer]
options:
  k3s:
    extraArgs:
      - arg: "--tls-san=host.k3d.internal"
        nodeFilters: [server:*]
      - arg: "--kubelet-arg=eviction-hard=imagefs.available<1%,nodefs.available<1%"
        nodeFilters: [server:*]
      - arg: "--kubelet-arg=eviction-minimum-reclaim=imagefs.available=1%,nodefs.available=1%"
        nodeFilters: [server:*]
      - arg: "--disable=traefik"
        nodeFilters: [server:*]
registries:
  config: |
    mirrors:
      "host.k3d.internal:10082":
        endpoint:
          - http://host.k3d.internal:10082
