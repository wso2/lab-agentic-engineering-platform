services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — shared by asdlc-api (BFF) and git-service.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: asdlc-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: asdlc
      POSTGRES_USER: asdlc
      POSTGRES_PASSWORD: asdlc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asdlc"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asdlc

  # ---------------------------------------------------------------------------
  # asdlc-api — Go BFF + GitHub webhook receiver. Reaches OC via the k3d
  # docker network (k3d-openchoreo-serverlb) and Thunder via the same
  # loadbalancer routed by Host header.
  # ---------------------------------------------------------------------------
  asdlc-api:
    build:
      context: ../asdlc-service
    container_name: asdlc-api
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      git-service:
        condition: service_started
      agents-service:
        condition: service_started
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "9090"
      LOG_LEVEL: "debug"
      DATABASE_URL: "postgres://asdlc:asdlc@postgres:5432/asdlc?sslmode=disable"
      DEPLOYMENT_TIER: "${DEPLOYMENT_TIER:-dev}"
      TEST_MODE: "true"

      # ── OpenChoreo platform API (reached via k3d loadbalancer + Host header)
      PLATFORM_API_SERVICE_BASE_URL: "${PLATFORM_API_SERVICE_BASE_URL}"
      PLATFORM_API_SERVICE_HOST: "${PLATFORM_API_SERVICE_HOST:-api.openchoreo.localhost}"

      # ── Sister services on the asdlc compose network
      AGENTS_SERVICE_BASE_URL: "http://agents-service:3400"
      GIT_SERVICE_BASE_URL: "http://git-service:3300"

      # ── Coding-agent runner reach-back URLs. These are passed verbatim to
      # the WorkflowRun parameter the runner pod reads. The pod runs in
      # `workflows-<orgID>` inside the cluster, so it must reach the
      # compose services through k3d's host bridge.
      AGENT_GIT_SERVICE_URL: "http://host.k3d.internal:3300"
      AGENT_PLATFORM_URL: "http://host.k3d.internal:9090"

      # ── GitHub webhook validation + connect-state HMAC.
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"
      GITHUB_WEBHOOK_PROXY_URL: "${GITHUB_WEBHOOK_PROXY_URL}"
      OAUTH_STATE_SIGNING_KEY: "${OAUTH_STATE_SIGNING_KEY}"
      GIT_COMMITTER_NAME: "${GIT_COMMITTER_NAME:-ASDLC Bot}"
      GIT_COMMITTER_EMAIL: "${GIT_COMMITTER_EMAIL:-bot@asdlc.dev}"

      # ── App OAuth bind path: BFF builds /login/oauth/authorize with this client_id.
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-asdlc-platform}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      BFF_PUBLIC_URL: "${BFF_PUBLIC_URL:-http://localhost:8090}"

      # ── Inbound JWT verification (Thunder JWKS, audience prefix asdlc-*).
      JWKS_URL: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
      JWT_ISSUER: "${JWT_ISSUER:-http://thunder.openchoreo.localhost:8080}"
      JWT_AUDIENCE: "${BFF_AUDIENCE:-asdlc-*}"

      # ── Phase 3 of api-platform-integration — Thunder admin client
      # for per-org publisher OAuth app lifecycle. The asdlc-system-client
      # OAuth app + Administrator role binding are provisioned by
      # values-thunder.yaml's 60-asdlc-system-role.sh bootstrap script.
      THUNDER_ADMIN_URL: "http://thunder.openchoreo.localhost:8080"
      THUNDER_SYSTEM_CLIENT_ID: "asdlc-system-client"
      THUNDER_SYSTEM_CLIENT_SECRET: "asdlc-system-client-secret"
      PLATFORM_IDP_ISSUER: "http://thunder.openchoreo.localhost:8080"
      PLATFORM_IDP_JWKS_URL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks"

      # ── OIDC config handed to user web-apps whose design has
      # auth.kind=oidc-spa. v1 reuses the asdlc-console-client Thunder
      # OAuth client (already SPA-shaped with PKCE + public). Per-app
      # redirect URIs are appended at dispatch time. Per-project
      # clients are a v2 follow-up (see docs/design/oauth-protected-webapp.md).
      USER_APPS_OIDC_ISSUER: "http://thunder.openchoreo.localhost:8080"
      USER_APPS_OIDC_CLIENT_ID: "asdlc-console-client"
      USER_APPS_OIDC_SCOPES: "openid profile"

      # ── Outbound Service JWTs — one client_credentials principal per
      # target audience (git-service, agents-service). The remote-worker
      # audience is gone — coding-agent runs as a ClusterWorkflow pod
      # and authenticates back to git-service with a per-task Task JWT.
      SERVICE_AUTH_TOKEN_URL: "http://k3d-openchoreo-serverlb:8080/oauth2/token"
      SERVICE_AUTH_CLIENT_ID: "asdlc-api-client"
      SERVICE_AUTH_CLIENT_SECRET: "asdlc-api-client-secret"
      SERVICE_AUTH_HOST_HEADER: "thunder.openchoreo.localhost"
      SERVICE_AUTH_GIT_TOKEN_URL: "http://k3d-openchoreo-serverlb:8080/oauth2/token"
      SERVICE_AUTH_GIT_CLIENT_ID: "${SERVICE_AUTH_GIT_CLIENT_ID:-asdlc-bff-to-git-service}"
      SERVICE_AUTH_GIT_CLIENT_SECRET: "${SERVICE_AUTH_GIT_CLIENT_SECRET:-asdlc-bff-to-git-service-secret}"
      SERVICE_AUTH_GIT_HOST_HEADER: "thunder.openchoreo.localhost"
      SERVICE_AUTH_AGENTS_TOKEN_URL: "http://k3d-openchoreo-serverlb:8080/oauth2/token"
      SERVICE_AUTH_AGENTS_CLIENT_ID: "${SERVICE_AUTH_AGENTS_CLIENT_ID:-asdlc-bff-to-agents-service}"
      SERVICE_AUTH_AGENTS_CLIENT_SECRET: "${SERVICE_AUTH_AGENTS_CLIENT_SECRET:-asdlc-bff-to-agents-service-secret}"
      SERVICE_AUTH_AGENTS_HOST_HEADER: "thunder.openchoreo.localhost"

      # ── Task JWT signing — RS256, PEM read from a bind-mounted file.
      # Docker-compose's `${VAR}` substitution doesn't preserve newlines
      # cleanly, so we mount the file rather than env-pass the contents.
      BFF_TASK_SIGNING_KEY_PATH: "/app/keys/task-signing.pem"
      BFF_TASK_TOKEN_ISSUER: "asdlc-bff"
      BFF_TASK_TOKEN_AUDIENCE: "git-service"

      # ── Observer (task-progress) — reads workflow logs via OC Observer.
      # Optional: leave empty to disable; the BFF returns 503 on /progress.
      #
      # Routing: BFF runs in docker-compose, Observer runs in the k3d
      # cluster. We can't reach the in-cluster Service DNS, so we route
      # through the main kgateway at host-port 8080 (k3d serverlb) using
      # Host: observer.openchoreo.localhost. setup-observability.sh creates
      # the cross-namespace HTTPRoute on `openchoreo-control-plane/gateway-default`
      # that resolves that hostname → the Observer Service. The extra_hosts
      # below maps observer.openchoreo.localhost → docker host gateway so
      # the BFF reaches the k3d serverlb.
      OBSERVER_URL: "${OBSERVER_URL:-http://observer.openchoreo.localhost:8080}"
      OBSERVER_OAUTH_TOKEN_URL: "${OBSERVER_OAUTH_TOKEN_URL:-http://k3d-openchoreo-serverlb:8080/oauth2/token}"
      OBSERVER_OAUTH_CLIENT_ID: "${OBSERVER_OAUTH_CLIENT_ID:-openchoreo-observer-resource-reader-client}"
      OBSERVER_OAUTH_CLIENT_SECRET: "${OBSERVER_OAUTH_CLIENT_SECRET:-openchoreo-observer-resource-reader-client-secret}"
      OBSERVER_OAUTH_HOST_HEADER: "${OBSERVER_OAUTH_HOST_HEADER:-thunder.openchoreo.localhost}"
    volumes:
      - ./keys/task-signing.pem:/app/keys/task-signing.pem:ro
    networks:
      - asdlc
      - k3d-openchoreo
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "api.openchoreo.localhost:host-gateway"
      - "thunder.openchoreo.localhost:host-gateway"
      - "observer.openchoreo.localhost:host-gateway"

  # ---------------------------------------------------------------------------
  # agents-service — AI BA/Architect/TaskGen/Wireframe agents (Vercel AI SDK).
  # No ANTHROPIC_API_KEY env: the key is resolved per-call via git-service
  # (org key if configured, platform fallback otherwise). See
  # docs/design/anthropic-key-dual-token.md §6.4.
  # ---------------------------------------------------------------------------
  agents-service:
    build:
      context: ../agents
    container_name: asdlc-agents-service
    ports:
      - "3400:3400"
    environment:
      PORT: "3400"
      LOG_LEVEL: "debug"
      AGENT_MODEL: "${AGENT_MODEL:-claude-sonnet-4-5}"
      # Inbound Service JWT verification.
      JWKS_URL: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
      JWT_ISSUER: "${JWT_ISSUER:-http://thunder.openchoreo.localhost:8080}"
      JWT_AUDIENCE: "${AGENTS_AUDIENCE:-asdlc-bff-to-agents-service}"
      # Resolve the per-org Anthropic key (or platform fallback) on each call.
      # The agents-service has no outbound Service-JWT client wired (mirrors
      # agent-manager-service); git-service's internal/credentials path must
      # therefore stay unauthenticated in this compose-only setup.
      GIT_SERVICE_URL: "http://git-service:3300"
    networks:
      - asdlc
    extra_hosts:
      - "thunder.openchoreo.localhost:host-gateway"

  # ---------------------------------------------------------------------------
  # git-service — Git operations + org-credential store. Needs K8s API access
  # to write per-WorkflowRun Secrets into `workflows-<orgID>` namespaces
  # (build credential + Anthropic key). KUBECONFIG points at the host
  # kubeconfig mounted at /app/.kube/config; start.sh seeds an internal
  # kubeconfig (server URL rewritten to the k3d server container name) so
  # the API is reachable from inside the asdlc/k3d-openchoreo networks.
  # See agent-manager-service's compose for the same pattern.
  # ---------------------------------------------------------------------------
  git-service:
    build:
      context: ../git-service
    container_name: asdlc-git-service
    ports:
      - "3300:3300"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: "3300"
      LOG_LEVEL: "debug"
      DATABASE_URL: "postgres://asdlc:asdlc@postgres:5432/asdlc?sslmode=disable"
      REPO_BASE_PATH: "/data/repos"
      DEPLOYMENT_TIER: "${DEPLOYMENT_TIER:-dev}"
      TEST_MODE: "true"

      # ── Committer attribution + repo defaults.
      GITHUB_REPO_VISIBILITY: "${GITHUB_REPO_VISIBILITY:-private}"
      GIT_COMMITTER_NAME: "${GIT_COMMITTER_NAME:-ASDLC Bot}"
      GIT_COMMITTER_EMAIL: "${GIT_COMMITTER_EMAIL:-bot@asdlc.dev}"

      # ── Webhook surface — git-service registers webhooks against each
      # repo pointing at the smee.io URL, then smee-client forwards them
      # to asdlc-api/webhooks/github.
      GITHUB_WEBHOOK_DELIVERY_URL: "${GITHUB_WEBHOOK_PROXY_URL}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"

      # ── OpenBao — credentials store (per-org GitHub PAT / App secrets).
      # In-cluster Service exposed on host port 8200 via k3d NodePort
      # (see k3d-local-config.yaml :8200 → :30820 → openbao).
      OPENBAO_ADDR: "${OPENBAO_ADDR:-http://host.docker.internal:8200}"
      OPENBAO_TOKEN: "${OPENBAO_TOKEN:-root}"

      # ── GitHub App (optional — only needed for App-mode connect).
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-asdlc-platform}"
      GITHUB_APP_PRIVATE_KEY_PATH: "${GITHUB_APP_PRIVATE_KEY_PATH:-/etc/github-app/private-key.pem}"

      # ── Inbound Service JWT verification — intentionally NOT set in v1.
      # With JWKS_URL unset, git-service's /api/v1/repos/* and
      # /internal/credentials/* fall through to its dev-mode "no auth"
      # handler (cmd/git-service/main.go), so agents-service can call the
      # effective-key resolver without a bearer (it has no service-auth
      # client). The BFF still mints + sends Service JWTs to git-service —
      # they are simply not verified in v1. Mirrors agent-manager's
      # docker-compose pattern (IS_LOCAL_DEV_ENV=true).
      # JWKS_URL: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
      # JWT_AUDIENCE: "asdlc-bff-to-git-service"
      # ── Task JWT verification on /api/v1/credentials/refresh (RS256, BFF-signed).
      BFF_JWKS_URL: "http://asdlc-api:9090/auth/external/jwks.json"
      TASK_JWT_ISSUER: "asdlc-bff"
      TASK_JWT_AUDIENCE: "git-service"

      # ── Anthropic platform fallback. agents-service calls
      # /internal/anthropic/effective-key on every dispatch; this is the
      # value returned when an org hasn't connected its own key.
      ANTHROPIC_PLATFORM_KEY: "${ANTHROPIC_API_KEY}"
      AGENTS_SERVICE_URL: "http://agents-service:3400"

      # ── K8s access — controller-runtime config.GetConfig() reads KUBECONFIG.
      # Required for mint-build (per-org build secret SSA into workflows-<orgID>)
      # and for apply-wp-secret (per-org Anthropic secret SSA). Without it,
      # git-service degrades: builds fail at clone, coding-agent dispatch
      # fails on the pre-flight.
      KUBECONFIG: "/app/.kube/config"
    volumes:
      - ${HOME}/specs/repos:/data/repos
      # GitHub App private key — read at startup, contents seeded into OpenBao.
      # Touched by start.sh if absent so the mount always exists.
      - ./github-app-private-key.pem:/etc/github-app/private-key.pem:ro
      # Internal kubeconfig — server URL points at k3d-openchoreo-server-0:6443
      # over the k3d-openchoreo docker network. Seeded by start.sh.
      - ./.kube/config:/app/.kube/config:ro
    networks:
      - asdlc
      - k3d-openchoreo
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "thunder.openchoreo.localhost:host-gateway"

  # ---------------------------------------------------------------------------
  # smee-client — forwards GitHub webhook events from the public smee.io
  # channel to asdlc-api/webhooks/github. In production this would be
  # replaced by a real ingress to the BFF.
  # ---------------------------------------------------------------------------
  smee-client:
    image: deltaprojects/smee-client:latest
    container_name: asdlc-smee-client
    depends_on:
      - asdlc-api
    command: ["--url", "${GITHUB_WEBHOOK_PROXY_URL}", "--target", "http://asdlc-api:9090/webhooks/github"]
    networks:
      - asdlc
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # console — React SPA served by nginx. The browser hits Thunder directly
  # via thunder.openchoreo.localhost (resolved by /etc/hosts → 127.0.0.1
  # → k3d loadbalancer). All API requests go through the same-origin
  # /asdlc-api-service/ nginx proxy → asdlc-api:9090.
  # ---------------------------------------------------------------------------
  console:
    build:
      context: ..
      dockerfile: console/Dockerfile
    container_name: asdlc-console
    ports:
      - "8090:3000"
    depends_on:
      - asdlc-api
    environment:
      ASDLC_API_PROXY_URL: "http://asdlc-api:9090"
      VITE_THUNDER_URL: "${PUBLIC_THUNDER_URL}"
      VITE_THUNDER_CLIENT_ID: "${VITE_THUNDER_CLIENT_ID:-asdlc-console-client}"
      VITE_THUNDER_SCOPES: "${VITE_THUNDER_SCOPES:-openid profile email}"
      VITE_SIGN_IN_REDIRECT_URL: "${PUBLIC_CONSOLE_URL}"
      VITE_SIGN_OUT_REDIRECT_URL: "${PUBLIC_CONSOLE_URL}/login"
    networks:
      - asdlc

volumes:
  pgdata:

networks:
  asdlc:
    driver: bridge
  k3d-openchoreo:
    external: true
