# Workload for the open (unauth) hello-world.
# BYOI pattern (no workflow) — image is pulled directly from Docker Hub.
# mendhak/http-https-echo:35 echoes the request (headers, body, JWT) — useful
# for verifying whether the Authorization header passed through.
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: poc-public-workload
  namespace: default
spec:
  owner:
    projectName: poc-api-platform
    componentName: poc-public
  container:
    image: mendhak/http-https-echo:35
    env:
      - key: HTTP_PORT
        value: "8080"
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility:
        - external
      basePath: /
