apiVersion: v1
data:
  values.yaml: |
    # Per-APIGateway value overlay merged on top of the operator's chart
    # defaults (see operator-values.yaml). Phase 6 — rewritten against
    # chart v1.0.1 key paths (`gateway.config.controller.*`, NOT the old
    # `gateway.config.gateway_controller.*` from v0.9.0).
    gateway:
      # Auto-generate the AES-GCM encryption key the controller needs at
      # boot. Combined with the api-platform-controller-aesgcm-key Secret
      # mounted via operator-values.yaml, this lets a clean cluster boot
      # without out-of-band key provisioning.
      developmentMode: true
      config:
        controller:
          # The 1.0.0 controller's `/health` endpoint goes through the
          # auth middleware. Dev keeps basic-auth off so kube-probe
          # 200s without credentials. Production should re-enable with
          # hashed creds in a Secret.
          auth:
            basic:
              enabled: false
              users: []
          logging:
            level: debug
            format: json
        # Phase 6 — the Thunder keymanager lives in BOTH the legacy
        # jwt-auth v0 policy (kept for backward compat) AND the v1
        # block (the trait emits version: v1 so each RestApi can pin
        # `issuers` + `audience`). Phase 7 (BYO-IDP) appends per-org
        # keymanagers here; v1 expects the platform admin to add the
        # org's keymanager + re-run setup-prerequisites.
        policy_configurations:
          jwtauth_v0:
            keymanagers:
            - name: PlatformIDPKeyManager
              issuer: http://thunder.openchoreo.localhost:8080
              jwks:
                remote:
                  uri: http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks
                  skipTlsVerify: true
            jwkscachettl: "5m"
            jwksfetchtimeout: "5s"
            jwksfetchretrycount: 3
            jwksfetchretryinterval: "2s"
            allowedalgorithms:
              - RS256
              - ES256
            leeway: "30s"
            authheaderscheme: Bearer
            headername: Authorization
            onfailurestatuscode: 401
            errormessageformat: json
            errormessage: "Authentication failed."
            validateissuer: true
          jwtauth_v1:
            keymanagers:
            - name: PlatformIDPKeyManager
              issuer: http://thunder.openchoreo.localhost:8080
              jwks:
                remote:
                  uri: http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks
                  skipTlsVerify: true
            jwkscachettl: "5m"
            jwksfetchtimeout: "5s"
            jwksfetchretrycount: 3
            jwksfetchretryinterval: "2s"
            allowedalgorithms:
              - RS256
              - ES256
            leeway: "30s"
            authheaderscheme: Bearer
            headername: Authorization
            onfailurestatuscode: 401
            errormessageformat: json
            errormessage: "Authentication failed."
            validateissuer: true
kind: ConfigMap
metadata:
  name: api-platform-operator-gateway-values
  namespace: openchoreo-data-plane
