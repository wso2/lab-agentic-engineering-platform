# RBAC for app-factory-git-service to write per-org build-credential
# Secrets directly into each org's workflow-plane namespace
# (`workflows-<ocOrgID>`).
#
# Background (post-2f26614 redesign — see
# docs/design/cross-component-wiring-gaps.md):
#   - git-service stores the credential in Postgres (AES-256-GCM).
#   - MintBuildToken now ALSO SSAs a per-org `kubernetes.io/basic-auth`
#     Secret into the org's WP namespace.
#   - The dockerfile-builder ClusterWorkflow's checkout step mounts that
#     Secret directly (no ExternalSecret synth, no OpenBao read).
#
# Scope: NAMESPACED Role + RoleBinding (one per `workflows-<orgID>`
# namespace), NOT a cluster-wide ClusterRole. Per platform-design-expert
# review: a ClusterRole leaks the capability to every pod in
# `dp-wso2cloud-app-factory-development-*` (asdlc-service, console,
# agents-service) because OC's `Workload` CRD has no `serviceAccountName`
# field — all those pods share the `default` SA. Restricting to a Role
# inside the WP namespace bounds the blast radius to exactly the
# namespace we write into.
#
# Multi-org: a new Role/RoleBinding pair is provisioned per org at
# org-onboarding time (TODO: wire into asdlc-service's org-create flow;
# until then `setup.sh` only seeds the `default` org's pair).
#
# Subject (`default` SA in the BFF release-binding namespace): OC's
# `Workload` CRD doesn't expose `serviceAccountName`, so git-service's
# pod runs as the namespace's default SA. The grant follows that SA into
# the WP namespace via this RoleBinding.
---
apiVersion: v1
kind: Namespace
metadata:
  name: workflows-default
  labels:
    app.kubernetes.io/managed-by: app-factory-deployments
    openchoreo.dev/workflow-plane-name: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-factory-git-service-secret-writer
  namespace: workflows-default
  labels:
    app.kubernetes.io/managed-by: app-factory-deployments
    app.kubernetes.io/part-of: app-factory
rules:
  # applyBuildSecret path — Server-Side Apply needs get + patch; create is
  # required for first-write; delete is required for the
  # org.disconnected cascade (see DeleteForOrg in build_credentials_service.go).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-factory-git-service-secret-writer
  namespace: workflows-default
  labels:
    app.kubernetes.io/managed-by: app-factory-deployments
    app.kubernetes.io/part-of: app-factory
subjects:
  - kind: ServiceAccount
    name: default
    namespace: dp-wso2cloud-app-factory-development-bad5f211
roleRef:
  kind: Role
  name: app-factory-git-service-secret-writer
  apiGroup: rbac.authorization.k8s.io
