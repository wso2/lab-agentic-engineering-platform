# HTTPRoute on the DP gateway for platform-idp.127.0.0.1.nip.io → Thunder.
# In-cluster services resolve platform-idp.127.0.0.1.nip.io via CoreDNS
# rewrite to the DP gateway (port 19080).  This route forwards to Thunder
# in the thunder namespace so JWKS / token calls work.
#
# Browser-side OIDC uses thunder.openchoreo.localhost:8080 via the CP gateway,
# so this route only handles in-cluster traffic.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: thunder-platform-idp-route
  namespace: openchoreo-data-plane
spec:
  parentRefs:
    - name: gateway-default
      namespace: openchoreo-data-plane
      port: 19080
  hostnames:
    - "platform-idp.127.0.0.1.nip.io"
  rules:
    - backendRefs:
        - name: thunder-service
          namespace: thunder
          port: 8090
