env:
  - key: SERVER_PORT
    value: "8080"
  - key: LOG_LEVEL
    value: "debug"
  - key: DEPLOYMENT_TIER
    value: "dev"
  - key: TEST_MODE
    value: "true"
  - key: DATABASE_URL
    value: "postgres://app_factory:app_factory_pwd@app-factory-postgresql.wso2cloud:5432/app_factory?sslmode=disable"
  - key: PLATFORM_API_SERVICE_BASE_URL
    value: "http://openchoreo-api.openchoreo-control-plane.svc.cluster.local:8080"
  - key: JWKS_URL
    value: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
  - key: JWT_ISSUER
    value: "http://thunder.openchoreo.localhost:8080"
  - key: OAUTH_TOKEN_ENDPOINT
    value: "http://thunder.openchoreo.localhost:8080/oauth2/token"
  - key: OAUTH_INTROSPECTION_ENDPOINT
    value: "http://thunder.openchoreo.localhost:8080/oauth2/token"
  - key: OAUTH_USERINFO_ENDPOINT
    value: "http://thunder.openchoreo.localhost:8080/oauth2/token"
  - key: SERVICE_AUTH_GIT_TOKEN_URL
    value: "http://thunder.openchoreo.localhost:8080/oauth2/token"
  - key: SERVICE_AUTH_GIT_CLIENT_ID
    value: "asdlc-bff-to-git-service"
  - key: SERVICE_AUTH_GIT_CLIENT_SECRET
    value: "asdlc-bff-to-git-service-secret"
  # SERVICE_AUTH_AGENTS_* intentionally not set — agents-service runs with JWKS
  # validation disabled (JWKS_URL not set), so service auth is unnecessary.
  # URL the coding-agent runner pod (in `workflows-<ouHandle>` ns) uses
  # to reach git-service in the data-plane release namespace. BFF passes
  # this verbatim to the WorkflowRun parameter, which the pod reads as
  # ASDLC_GIT_SERVICE_URL.
  #
  # The dp-wso2cloud-app-factory-development-<hash> suffix is derived
  # deterministically by OC's release controller from
  # (org=default, project=app-factory, env=development) — the hash
  # `bad5f211` is stable across teardown+setup.sh re-runs as long as
  # the (org, project, env) tuple stays the same. If they change,
  # setup.sh needs to discover this dynamically.
  - key: AGENT_GIT_SERVICE_URL
    value: "http://app-factory-git-service.dp-wso2cloud-app-factory-development-bad5f211.svc.cluster.local:3300"
  - key: BFF_TASK_SIGNING_KEY
    value: "${BFF_TASK_SIGNING_KEY}"
  - key: BFF_TASK_TOKEN_ISSUER
    value: "asdlc-bff"
  - key: BFF_TASK_TOKEN_AUDIENCE
    value: "git-service"
  - key: OAUTH_STATE_SIGNING_KEY
    value: "${OAUTH_STATE_SIGNING_KEY}"
  - key: GITHUB_WEBHOOK_SECRET
    value: "${GITHUB_WEBHOOK_SECRET}"
  # Observer client — task-execution-progress.md §5.4. Reads the
  # platform-default reader OAuth app's secret out of OpenBao via the
  # SecretReference at wso2cloud-deployment/.../secret-references/
  # app-factory-observer-oauth.yaml. The workflow-plane namespace name
  # is derived per-request as `workflows-<ouHandle>` inside the BFF
  # (no platform-wide WORKFLOW_PLANE_NAMESPACE setting any more).
  - key: OBSERVER_URL
    value: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
  - key: OBSERVER_OAUTH_TOKEN_URL
    value: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  - key: OBSERVER_OAUTH_CLIENT_ID
    value: "openchoreo-observer-resource-reader-client"
  - key: OBSERVER_OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: app-factory-observer-oauth
        key: client_secret
