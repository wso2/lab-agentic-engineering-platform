env:
  - key: PORT
    value: "3400"
  - key: LOG_LEVEL
    value: "debug"
  - key: AGENT_MODEL
    value: "claude-sonnet-4-5"
  - key: JWT_ISSUER
    value: "http://thunder.openchoreo.localhost:8080"
  - key: JWT_AUDIENCE
    value: "asdlc-bff-to-agents-service"
  # In-cluster base URL of git-service. agents-service uses this to resolve
  # the effective Anthropic API key per call (org key when configured,
  # platform fallback otherwise — see docs/design/anthropic-key-dual-token.md §6.4).
  - key: GIT_SERVICE_URL
    value: "http://app-factory-git-service:3300"
  # ANTHROPIC_API_KEY env entry deliberately removed — the key is no
  # longer mounted into this Workload. It's fetched per-request via the
  # git-service resolver above.
