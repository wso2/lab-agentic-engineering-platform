worker_processes auto;

error_log /var/log/nginx/error.log warn;
# /tmp is writable by the non-root nginx user. /var/run/nginx.pid fails
# because nginx unlinks and recreates the pid file on startup, which needs
# write on the parent dir (/var/run is root-owned 0755 — chown'ing only the
# file at build time doesn't help).
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Resolve Kubernetes DNS at runtime so nginx picks up new Service
    # ClusterIPs without restart.  Variable-based proxy_pass in each
    # location block uses this resolver; literal proxy_pass URLs are
    # resolved once at startup and cached forever.
    # __DNS_RESOLVERS__ is substituted at entrypoint time with the
    # nameserver IPs from /etc/resolv.conf (auto-populated by kubelet).
    resolver __DNS_RESOLVERS__ valid=10s ipv6=off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 3000;
        listen [::]:3000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location = /env-config.js {
            alias /usr/share/nginx/html/env-config.js;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # Collaborative editing WebSocket proxy — forwards /collab/* to the
        # collab-server. WebSocket upgrade headers are required.
        location /collab/ {
            set $collab_backend collab-server:3400;
            proxy_pass http://$collab_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Same-origin API proxy — browser requests to /asdlc-api-service/*
        # are forwarded server-side so no CORS headers are needed.
        #
        # SSE (Server-Sent Events) streaming is used for AI generation
        # endpoints (spec, design, etc.).  Nginx buffers proxy responses by
        # default which defeats real-time streaming — individual SSE frames
        # accumulate in the buffer instead of being forwarded to the browser
        # immediately.  proxy_buffering off + proxy_cache off disable all
        # buffering; increased timeouts handle long-running generation.
        location /asdlc-api-service/ {
            set $api_backend __ASDLC_API_BACKEND__;
            rewrite ^/asdlc-api-service/(.*) /$1 break;
            proxy_pass http://$api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
        }

        # GitHub-facing callback URLs — must match the URL registered in
        # the GitHub App's "User Authorization Callback URL" field (and
        # legacy Setup URL configurations). GitHub redirects the user's
        # browser here after OAuth authorize (?code&state) and, when
        # "Request OAuth during installation" is enabled, also after
        # install (?code&installation_id&state).
        #
        # The /connect/callback path is the binding-centric refactor's
        # single callback. /app/callback is kept proxied so the BFF's
        # 410 Gone reaches anyone with stale GitHub App config — without
        # the proxy entry, nginx's SPA fallback would silently absorb
        # the request, leaving the user confused.
        location /api/v1/github/ {
            set $api_backend __ASDLC_API_BACKEND__;
            proxy_pass http://$api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
