# oapi-codegen configuration for OpenChoreo client generation.
# DO NOT EDIT generated files (gen/*.gen.go). Regenerate via `make gen-oc-client`.
package: gen
output: clients/openchoreo/gen/client.gen.go
generate:
  models: false
  client: true
  embedded-spec: false
output-options:
  response-type-suffix: Resp
