apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: app-factory-api
endpoints:
  - name: http
    type: HTTP
    port: 8080
    visibility:
      - project
dependencies:
  endpoints:
    - component: app-factory-git-service
      name: http
      visibility: project
      envBindings:
        address: GIT_SERVICE_BASE_URL
    - component: app-factory-agents-service
      name: http
      visibility: project
      envBindings:
        address: AGENTS_SERVICE_BASE_URL
